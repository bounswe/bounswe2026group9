<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Random Dog Image</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      min-height: 100vh;
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #f8fafc, #e2e8f0);
      padding: 24px;
    }
    .card {
      width: 100%;
      max-width: 780px;
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
      padding: 28px;
    }
    h1 { color: #1e293b; margin: 0 0 8px; }
    p { color: #475569; margin: 0 0 12px; }
    img {
      width: 100%;
      max-height: 420px;
      object-fit: contain;
      border-radius: 12px;
      background: #f1f5f9;
      margin: 12px 0;
    }
    button {
      padding: 10px 16px;
      border: none;
      border-radius: 10px;
      background: #4f46e5;
      color: #fff;
      cursor: pointer;
      font-weight: 600;
    }
    button:hover { background: #4338ca; }
    pre {
      background: #0f172a;
      color: #e2e8f0;
      border-radius: 10px;
      padding: 14px;
      overflow: auto;
      max-height: 220px;
    }
    a { color: #4f46e5; text-decoration: none; font-weight: 600; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Random Dog Image</h1>
    <p>
      This page calls the public <strong>dog.ceo</strong> API endpoint
      <code>/api/breeds/image/random</code>. It returns a random dog image URL.
    </p>

    <img id="dogImage" alt="Random dog" />
    <div style="margin: 8px 0 16px;">
      <button id="reloadBtn" type="button">Show Another Dog</button>
    </div>

    <pre id="result">Loading...</pre>
    <p style="margin-top: 12px;"><a href="./index.html">← Back to home</a></p>
  </div>

  <script>
    async function loadRandomDog() {
      const resultEl = document.getElementById("result");
      const imgEl = document.getElementById("dogImage");
      resultEl.textContent = "Loading...";

      try {
        const res = await fetch("https://dog.ceo/api/breeds/image/random");
        if (!res.ok) throw new Error("HTTP " + res.status);

        const data = await res.json();
        imgEl.src = data.message;
        resultEl.textContent = JSON.stringify(data, null, 2);
      } catch (err) {
        resultEl.textContent = "Error: " + err.message;
      }
    }

    document.getElementById("reloadBtn").addEventListener("click", loadRandomDog);
    loadRandomDog();
  </script>
</body>
</html>
